<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldCup 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: url('pictures/WC background.png') center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(30, 60, 114, 0.7);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        header h1 {
            font-size: 3.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        header p {
            font-size: 1.2em;
            font-style: italic;
            color: #ffd700;
        }

        .main-image {
            text-align: center;
            margin-bottom: 40px;
        }

        .main-image img {
            max-width: 400px;
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .flags-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .flag-item {
            text-align: center;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .flag-item:hover {
            transform: scale(1.1);
        }

        .flag-item a {
            text-decoration: none;
            display: block;
        }

        .flag-item img {
            max-width: 100%;
            height: 100px;
            object-fit: contain;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .music-section {
            background: rgba(255, 255, 255, 0.15);
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .music-section h2 {
            color: #ffd700;
            margin-bottom: 20px;
            text-align: center;
            font-size: 2em;
        }

        .songs-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .song-card {
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #ffd700;
        }

        .song-card h3 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .song-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        button {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            border: none;
            padding: 12px 25px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: #1e3c72;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button.stop {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8787 100%);
            color: white;
        }

        .control-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            padding: 20px;
        }

        .control-buttons button {
            padding: 15px 40px;
            font-size: 1.1em;
        }

        .now-playing {
            text-align: center;
            color: white;
            font-size: 1.1em;
            min-height: 30px;
            margin-top: 15px;
        }

        .now-playing.active {
            color: #ffd700;
            font-weight: bold;
        }

        .host-countries {
            background: rgba(255, 255, 255, 0.15);
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .host-countries h2 {
            color: #ffd700;
            margin-bottom: 20px;
            text-align: center;
            font-size: 2em;
        }

        .countries-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .country-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #ffd700;
        }

        .country-item img {
            align-items: center;
            width: 60px;
            height: 60px;
            object-fit: contain;
            border-radius: 5px;
        }

        .country-item p {
            color: white;
            font-size: 1.2em;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2.5em;
            }

            .songs-container {
                grid-template-columns: 1fr;
            }

            .control-buttons {
                flex-direction: column;
            }

            .control-buttons button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚽ WORLD CUP 2026 ⚽</h1>
        </header>

        <div class="main-image">
            <img src="pictures/WC 2026.png" alt="World Cup 2026">
        </div>
        <h2 style="color: #ffd700; text-align: center; margin-bottom: 20px; font-size: 2em;">Příklady Zemí</h2>
        <div class="flags-gallery">
            <div class="flag-item">
                <a href="czechia.html">
                    <img src="pictures/czech flag.png" alt="Czech Republic">
                </a>
            </div>
            <div class="flag-item">
                <a href="argentina.html">
                    <img src="pictures/argentina flag.png" alt="Argentina">
                </a>
            </div>
            <div class="flag-item">
                <a href="portugal.html">
                    <img src="pictures/portugal flag.png" alt="Portugal">
                </a>
            </div>
            <div class="flag-item">
                <a href="spain.html">
                    <img src="pictures/spain flag.png" alt="Spain">
                </a>
            </div>
        </div>

        <div class="music-section">
            <h2>🎵 World Cup Písničky 🎵</h2>
            
            <div class="songs-container">
                <div class="song-card">
                    <h3>Nejlepší Song 😍</h3>
                    <p>Dai Dai od Shakiry</p>
                    <div class="song-buttons">
                        <button onclick="playSong('Dai Dai')">Play</button>
                        <button class="stop" onclick="stopSong()">Stop</button>
                    </div>
                </div>

                <div class="song-card">
                    <h3>Nejhorší Song 😩</h3>
                    <p>Lighter od Jellyho Rolla</p>
                    <div class="song-buttons">
                        <button onclick="playSong('Lighter')">Play</button>
                        <button class="stop" onclick="stopSong()">Stop</button>
                    </div>
                </div>
            </div>

            <div class="now-playing" id="nowPlaying"></div>

            <div class="control-buttons">
                <button onclick="stopAllSongs()">⏹️ Přestat hrát</button>
            </div>
        </div>

        <div class="host-countries">
            <h2>🌍 Hostitelské Země 🌍</h2>
            
            <div class="countries-list">
                <div class="country-item">
                    <img src="pictures/usa flag.png" alt="USA">
                    <p>USA</p>
                </div>
                <div class="country-item">
                    <img src="pictures/canada flag.png" alt="Canada">
                    <p>Kanada</p>
                </div>
                <div class="country-item">
                    <img src="pictures/mexico flag.png" alt="Mexico">
                    <p>Mexiko</p>
                </div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" style="display: none;"></audio>

    <script>
        const audioPlayer = document.getElementById('audioPlayer');
        const nowPlayingDiv = document.getElementById('nowPlaying');
        let currentSong = null;

        const songs = {
            'Dai Dai': 'music/Dai Dai.mp3',
            'Lighter': 'music/Lighter.mp3'
        };

        function playSong(songName) {
            // If a song is already playing, stop it first
            if (currentSong !== null) {
                audioPlayer.pause();
                audioPlayer.currentTime = 0;
            }

            currentSong = songName;
            audioPlayer.src = songs[songName];
            audioPlayer.play();

            // Update the now playing display
            if (songName === 'Dai Dai') {
                nowPlayingDiv.textContent = '▶️ Teď Hraje: Dai Dai By Shakira';
                nowPlayingDiv.classList.add('active');
            } else if (songName === 'Lighter') {
                nowPlayingDiv.textContent = '▶️ Teď Hraje: Lighter By Jelly Roll';
                nowPlayingDiv.classList.add('active');
            }

            // Handle when song ends
            audioPlayer.onended = function() {
                nowPlayingDiv.textContent = '';
                nowPlayingDiv.classList.remove('active');
                currentSong = null;
            };
        }

        function stopSong() {
            if (audioPlayer.src) {
                audioPlayer.pause();
                audioPlayer.currentTime = 0;
                nowPlayingDiv.textContent = '';
                nowPlayingDiv.classList.remove('active');
                currentSong = null;
            }
        }

        function stopAllSongs() {
            stopSong();
        }
    </script>
</body>
</html>
